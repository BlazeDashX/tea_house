<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Tea House</title>
</head>

<body class="font-manrope px-4 lg:px-0 pt-4 lg:pt-0">

    <section class="hero">
        <div
            class="parent_div flex flex-col md:flex-row justify-between items-center min-h[200px] max-w-[1300px] mx-auto">
            <div class="left_div">
                <div>
                    <h1 class="md:text-7xl text-5xl font-bold ">It's good <br> tea time at The <br>Tea House</h1>
                    <p class="text-lg text-gray-700 my-10">Tea and Botanical Solutions Supplier Give Optimum <br>
                        Satisfaction To Your Taste Buds.</p>
                    <button
                        class="w-[200px] text-xl text-white rounded-lg h-[64px] bg-gradient-to-r from-[#ff8938] to-[#ff0000] ">
                        <span>Explore More</span>
                        <span> <i class="fa-solid fa-arrow-down -rotate-135"></i></span>
                    </button>
                </div>
            </div>
            <div class="right_div relative">
                <img src="images/banner.png" alt="" class="relative top-[120px]">
                <div
                    class=" w-52 h-18 md:w-[255px] md:h-[100px]  rounded-lg flex items-center shadow-md absolute bg-white -left-[-70px]">
                    <span class="text-yellow-300 text-2xl md:text-4xl"><i class="fa-solid fa-star"></i></span>
                    <div class="ml-4">
                        <p class="text-xl md:text-4xl font-bold">5.00</p>
                        <p class="md:text-lg">Trust Pilot Ratings</p>
                    </div>
                </div>
            </div>
        </div>
    </section>


    <section class="featured_products"></section>

    <section class="gallery"></section>

    <section class="clients"></section>

    <section class="news_and_events"></section>

    <section class="footer"></section>

</body>

</html>
